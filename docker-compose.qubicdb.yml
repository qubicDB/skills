# QubicDB Docker Compose
# Usage: docker compose -f docker-compose.qubicdb.yml up -d
#
# Note: The official qubicdb/qubicdb:latest image does NOT include vector support.
# Vector support requires building from Dockerfile.vector in the qubicdb repo.

services:
  qubicdb:
    image: qubicdb/qubicdb:latest
    container_name: qubicdb
    networks:
      - qubicdb-net
    ports:
      - "6060:6060"
    volumes:
      - qubicdb_data:/app/data
    environment:
      - QUBICDB_HTTP_ADDR=:6060
      - QUBICDB_DATA_PATH=/app/data
      # Admin
      - QUBICDB_ADMIN_ENABLED=true
      - QUBICDB_ADMIN_USER=admin
      - QUBICDB_ADMIN_PASSWORD=changeme
      # MCP
      - QUBICDB_MCP_ENABLED=true
      - QUBICDB_MCP_PATH=/mcp
      - QUBICDB_MCP_STATELESS=true
      - QUBICDB_MCP_RATE_LIMIT_RPS=30
      - QUBICDB_MCP_RATE_LIMIT_BURST=60
      - QUBICDB_MCP_ENABLE_PROMPTS=true
      - QUBICDB_MCP_API_KEY=qubicdb-mcp-secret-key
      # Security / CORS
      - QUBICDB_ALLOWED_ORIGINS=http://localhost:6060,http://localhost:8080,http://127.0.0.1:8080
      - QUBICDB_REGISTRY_ENABLED=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6060/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M

  qubicdb-ui:
    image: qubicdb/qubicdb-ui:latest
    container_name: qubicdb-ui
    networks:
      - qubicdb-net
    depends_on:
      qubicdb:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

networks:
  qubicdb-net:
    driver: bridge

volumes:
  qubicdb_data:
    driver: local
